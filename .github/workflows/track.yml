name: ETF Holdings Daily Tracker

on:
  schedule:
    # 매일 UTC 12:00 = 한국시간 저녁 9시
    - cron: "0 12 * * *"
  workflow_dispatch: {}   # Actions 탭에서 수동 실행 가능

permissions:
  contents: write

# 동시 실행 방지: 이미 실행 중이면 새 실행은 순서를 기다림
concurrency:
  group: etf-tracker-daily
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 라이브러리 설치
        run: pip install requests pandas lxml

      - name: ETF 보유현황 수집
        run: python etf_tracker.py

      - name: 텔레그램 알림 전송
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python telegram_notify.py

      - name: 결과 커밋
        run: |
          git config user.name "etf-tracker-bot"
          git config user.email "actions@github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "변경 사항 없음 — 커밋 생략"
            exit 0
          fi
          git commit -m "chore: holdings update $(date -u +%Y-%m-%d)"
          # 그 사이 저장소에 새 커밋이 생겼어도 충돌 없이 합친 뒤 푸시
          git pull --rebase -X theirs origin main || true
          git push
